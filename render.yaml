services:
  - type: web
    name: dbms-project
    env: node
    buildCommand: npm run render:build
    startCommand: npm start
    envVars:
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_CONNECTSTRING
        sync: false
      - key: ORACLE_DRIVER_MODE
        value: thin
      - key: NODE_ENV
        value: production
