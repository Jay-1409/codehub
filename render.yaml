services:
  - type: web
    name: dbms-project
    env: node
    buildCommand: npm run render:build
    startCommand: bash -lc 'export LD_LIBRARY_PATH="${INSTANT_CLIENT_PATH}:${LD_LIBRARY_PATH:-}"; node server.js'
    envVars:
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_CONNECTSTRING
        sync: false
      - key: INSTANT_CLIENT_PATH
        value: /opt/render/project/src/.render/oracle/instantclient
      - key: LD_LIBRARY_PATH
        value: /opt/render/project/src/.render/oracle/instantclient
      - key: NODE_ENV
        value: production
